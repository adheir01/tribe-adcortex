version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Project 04 — tribe-adcortex
# Port convention (consistent across all 4 projects):
#   PostgreSQL: 5435   Streamlit: 8504
# All ports bound to 127.0.0.1 — never exposed to public internet
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL database ──────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: tribe_db
    environment:
      POSTGRES_DB:       tribe_scorer
      POSTGRES_USER:     tribe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tribe -d tribe_scorer"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Streamlit dashboard ──────────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: tribe_app
    ports:
      - "127.0.0.1:8504:8501"
    environment:
      PYTHONPATH:   /app
      DATABASE_URL: postgresql://tribe:${POSTGRES_PASSWORD}@db:5432/tribe_scorer
    volumes:
      - ./results:/app/results       # results JSON files
      - ./creatives:/app/creatives   # ad MP4 files — upload page reads/writes here
      - ./remote:/app/remote         # inference scripts — upload page sends these to pod
      - ./app:/app                   # live code reload
      - ~/.ssh:/root/.ssh:ro         # SSH keys for paramiko (read-only)
    depends_on:
      db:
        condition: service_healthy
    command: streamlit run main.py --server.port 8501 --server.address 0.0.0.0

volumes:
  pgdata:
    name: tribe_pgdata
